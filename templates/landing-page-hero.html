<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hero Background</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #p5-canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: white;
      padding: 2rem;
    }

    .hero-content h1 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .hero-content p {
      font-size: 1.5rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .hero-btn {
      display: inline-block;
      padding: 1rem 2rem;
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .hero-btn:hover {
      background: white;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div id="p5-canvas"></div>
    <div class="hero-content">
      <h1>Welcome to the Future</h1>
      <p>Experience the power of creative coding</p>
      <a href="#" class="hero-btn">Get Started</a>
    </div>
  </section>

  <script>
    // ============================================
    // P5.JS ANIMATED BACKGROUND
    // Replace with your preferred pattern from patterns/
    // ============================================

    let particles = [];
    const NUM_PARTICLES = 150;

    function setup() {
      let canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('p5-canvas');

      // Initialize particles
      for (let i = 0; i < NUM_PARTICLES; i++) {
        particles.push(new Particle());
      }
    }

    function draw() {
      // Gradient background
      setGradient(0, 0, width, height,
        color(26, 26, 46),
        color(22, 33, 62)
      );

      // Update and display particles
      for (let p of particles) {
        p.update();
        p.display();
        p.connectNearby(particles);
      }
    }

    function setGradient(x, y, w, h, c1, c2) {
      noFill();
      for (let i = y; i <= y + h; i++) {
        let inter = map(i, y, y + h, 0, 1);
        let c = lerpColor(c1, c2, inter);
        stroke(c);
        line(x, i, x + w, i);
      }
    }

    class Particle {
      constructor() {
        this.pos = createVector(random(width), random(height));
        this.vel = createVector(random(-0.5, 0.5), random(-0.5, 0.5));
        this.size = random(2, 4);
        this.alpha = random(100, 200);
      }

      update() {
        this.pos.add(this.vel);

        // Wrap around edges
        if (this.pos.x < 0) this.pos.x = width;
        if (this.pos.x > width) this.pos.x = 0;
        if (this.pos.y < 0) this.pos.y = height;
        if (this.pos.y > height) this.pos.y = 0;
      }

      display() {
        noStroke();
        fill(100, 200, 255, this.alpha);
        ellipse(this.pos.x, this.pos.y, this.size);
      }

      connectNearby(particles) {
        for (let other of particles) {
          let d = dist(this.pos.x, this.pos.y, other.pos.x, other.pos.y);
          if (d < 100 && d > 0) {
            let alpha = map(d, 0, 100, 100, 0);
            stroke(100, 200, 255, alpha);
            strokeWeight(0.5);
            line(this.pos.x, this.pos.y, other.pos.x, other.pos.y);
          }
        }
      }
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
